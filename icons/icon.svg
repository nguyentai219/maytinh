<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6aafb8"/>
      <stop offset="100%" style="stop-color:#4e8e97"/>
    </linearGradient>
    <linearGradient id="btn1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d8d8d8"/>
      <stop offset="100%" style="stop-color:#b8b8b8"/>
    </linearGradient>
    <linearGradient id="btneq" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a838"/>
      <stop offset="100%" style="stop-color:#d87018"/>
    </linearGradient>
    <linearGradient id="btnac" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e87272"/>
      <stop offset="100%" style="stop-color:#c84848"/>
    </linearGradient>
  </defs>

  <!-- Body -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Display screen -->
  <rect x="52" y="52" width="408" height="148" rx="20" fill="rgba(0,0,0,0.25)"/>
  <rect x="60" y="60" width="392" height="132" rx="16" fill="#1a4a52"/>

  <!-- Display number -->
  <text x="436" y="148" font-family="monospace" font-size="72" font-weight="300" fill="#e0f4f6" text-anchor="end">1.250</text>
  <!-- Display sub text -->
  <text x="436" y="178" font-family="sans-serif" font-size="22" fill="rgba(255,255,255,0.4)" text-anchor="end" font-style="italic">một nghìn hai trăm năm mươi</text>

  <!-- Wave bars (speaking indicator) -->
  <rect x="72" y="148" width="8" height="14" rx="4" fill="#4ecdc4" opacity="0.8"/>
  <rect x="86" y="138" width="8" height="34" rx="4" fill="#4ecdc4" opacity="0.9"/>
  <rect x="100" y="130" width="8" height="50" rx="4" fill="#4ecdc4"/>
  <rect x="114" y="138" width="8" height="34" rx="4" fill="#4ecdc4" opacity="0.9"/>
  <rect x="128" y="148" width="8" height="14" rx="4" fill="#4ecdc4" opacity="0.8"/>

  <!-- Button row 1: AC % +/- ÷ -->
  <rect x="52" y="224" width="88" height="60" rx="13" fill="url(#btnac)"/>
  <text x="96" y="263" font-family="sans-serif" font-size="26" font-weight="800" fill="white" text-anchor="middle">AC</text>

  <rect x="152" y="224" width="88" height="60" rx="13" fill="url(#btn1)"/>
  <text x="196" y="263" font-family="sans-serif" font-size="28" fill="#333" text-anchor="middle">%</text>

  <rect x="252" y="224" width="88" height="60" rx="13" fill="url(#btn1)"/>
  <text x="296" y="263" font-family="sans-serif" font-size="22" fill="#333" text-anchor="middle">+/−</text>

  <rect x="352" y="224" width="108" height="60" rx="13" fill="url(#btn1)"/>
  <text x="406" y="265" font-family="sans-serif" font-size="34" fill="#333" text-anchor="middle">÷</text>

  <!-- Button row 2: 7 8 9 × -->
  <rect x="52" y="296" width="88" height="60" rx="13" fill="url(#btn1)"/>
  <text x="96" y="337" font-family="monospace" font-size="34" fill="#1a1a1a" text-anchor="middle">7</text>

  <rect x="152" y="296" width="88" height="60" rx="13" fill="url(#btn1)"/>
  <text x="196" y="337" font-family="monospace" font-size="34" fill="#1a1a1a" text-anchor="middle">8</text>

  <rect x="252" y="296" width="88" height="60" rx="13" fill="url(#btn1)"/>
  <text x="296" y="337" font-family="monospace" font-size="34" fill="#1a1a1a" text-anchor="middle">9</text>

  <rect x="352" y="296" width="108" height="60" rx="13" fill="url(#btn1)"/>
  <text x="406" y="337" font-family="sans-serif" font-size="34" fill="#1a1a1a" text-anchor="middle">×</text>

  <!-- Button row 3: 0(double) , ⌫ = -->
  <rect x="52" y="368" width="188" height="60" rx="13" fill="url(#btn1)"/>
  <text x="146" y="409" font-family="monospace" font-size="34" fill="#1a1a1a" text-anchor="middle">0</text>

  <rect x="252" y="368" width="88" height="60" rx="13" fill="url(#btn1)"/>
  <text x="296" y="409" font-family="sans-serif" font-size="28" fill="#333" text-anchor="middle">,</text>

  <rect x="352" y="368" width="108" height="124" rx="13" fill="url(#btneq)"/>
  <text x="406" y="447" font-family="sans-serif" font-size="48" fill="white" text-anchor="middle">=</text>
</svg>
